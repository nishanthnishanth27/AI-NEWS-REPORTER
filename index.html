<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Reporter - NISHANTH KN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        #splash-screen { transition: opacity 0.8s ease-out; z-index: 1000; }
        @keyframes loading-bar { 0% { transform: translateX(-100%); } 100% { transform: translateX(250%); } }
        .animate-loading-bar { animation: loading-bar 2s ease-in-out infinite; }
        
        /* Sidebar Smooth Transition */
        #sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 500; }
        .sidebar-open { transform: translateX(0); }
        .sidebar-closed { transform: translateX(-100%); }
        #overlay { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="bg-[#050505] text-white min-h-screen font-sans overflow-x-hidden">

    <div id="splash-screen" class="fixed inset-0 flex flex-col items-center justify-center bg-black">
        <h1 class="text-2xl font-black text-blue-500 tracking-tighter uppercase italic">AI NEWS REPORTER</h1>
        <p class="text-gray-500 text-[10px] mt-2 uppercase tracking-widest font-bold">DEVELOPED BY NISHANTH KN</p>
        <div class="w-48 h-1 bg-gray-900 rounded-full mt-8 overflow-hidden">
            <div class="h-full bg-blue-600 animate-loading-bar"></div>
        </div>
    </div>

    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[450] hidden opacity-0"></div>

    <div id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-[#0a0a0a] border-r border-gray-900 shadow-2xl sidebar-closed flex flex-col p-6">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-blue-500 font-black italic tracking-widest">DASHBOARD</h2>
            <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white transition-colors">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <div class="flex flex-col items-center mb-8 border-b border-gray-800 pb-8">
            <div class="relative">
                <img src="https://raw.githubusercontent.com/nishanthnishanth27/AI-NEWS-REPORTER/main/profile.png" 
                     class="w-24 h-24 rounded-full border-2 border-blue-600 object-cover p-1"
                     onerror="this.src='https://ui-avatars.com/api/?name=Nishanth+KN&background=000&color=fff'">
                <div class="absolute bottom-1 right-1 w-4 h-4 bg-green-500 border-2 border-black rounded-full"></div>
            </div>
            <h3 class="font-bold text-lg mt-4">NISHANTH KN</h3>
            <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest mt-1">DATA SCIENTIST</p>
        </div>

        <nav class="space-y-2 flex-1">
            <button class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-blue-600/10 hover:text-blue-400 transition-all group">
                <i class="fas fa-user-circle text-gray-500 group-hover:text-blue-400"></i> 
                <span class="text-xs font-black uppercase tracking-widest">My Profile</span>
            </button>
            <button onclick="showAbout()" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-blue-600/10 hover:text-blue-400 transition-all group">
    <i class="fas fa-info-circle text-gray-500 group-hover:text-blue-400"></i> 
    <span class="text-xs font-black uppercase tracking-widest">About App</span>
            </button>
            <a href="mailto:your-nishanthnishanth47622@gmail.com" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-blue-600/10 hover:text-blue-400 transition-all group">
                <i class="fas fa-paper-plane text-gray-500 group-hover:text-blue-400"></i> 
                <span class="text-xs font-black uppercase tracking-widest">Contact Support</span>
            </a>
        </nav>

        <div class="pt-6 border-t border-gray-900 opacity-40">
            <p class="text-[8px] text-center font-bold tracking-[0.3em]">VERSION 2.4.0</p>
        </div>
    </div>

    <header class="p-4 bg-black/60 backdrop-blur-xl sticky top-0 z-[100] border-b border-gray-900">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center bg-gray-900 rounded-xl text-blue-500 hover:bg-blue-600 hover:text-white transition-all">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="flex items-center gap-2">
                    <h1 class="text-lg font-black text-blue-500 uppercase italic tracking-tighter">AI NEWS REPORTER</h1>
                </div>
            </div>
            
            <div class="flex items-center gap-3 bg-gray-900/50 p-1.5 pr-4 rounded-full border border-gray-800">
                <img src="https://raw.githubusercontent.com/nishanthnishanth27/AI-NEWS-REPORTER/main/profile.png" 
                     class="w-8 h-8 rounded-full border border-blue-600 object-cover"
                     onerror="this.src='https://ui-avatars.com/api/?name=NK'">
                <p class="text-[9px] font-black uppercase tracking-widest hidden sm:block">Nishanth</p>
            </div>
        </div>
    </header>

    <main class="p-4 max-w-6xl mx-auto">
        <div class="bg-[#0f1115] border border-gray-800 p-2 rounded-full shadow-2xl mt-8 flex items-center gap-2 max-w-2xl mx-auto focus-within:border-blue-600 transition-all">
            <input type="text" id="searchInput" placeholder="Search news, topics, tech..." 
                   class="flex-1 bg-transparent px-5 outline-none text-gray-300 text-sm">
            <button onclick="startVoiceSearch()" id="micBtn" class="p-3 text-gray-500 hover:text-blue-500 transition-all">
                <i class="fas fa-microphone"></i>
            </button>
            <button onclick="FetchNews()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-full font-black text-[10px] uppercase transition-all shadow-lg shadow-blue-900/20">Search</button>
        </div>

        <div class="flex flex-wrap gap-2 justify-center mt-8">
            <button onclick="FetchByCategory('Technology')" class="bg-gray-900 border border-gray-800 px-4 py-2 rounded-xl text-[9px] font-bold hover:border-blue-500 transition-all uppercase">💻 Technology</button>
            <button onclick="FetchByCategory('Sports')" class="bg-gray-900 border border-gray-800 px-4 py-2 rounded-xl text-[9px] font-bold hover:border-blue-500 transition-all uppercase">🏆 Sports</button>
            <button onclick="FetchByCategory('Business')" class="bg-gray-900 border border-gray-800 px-4 py-2 rounded-xl text-[9px] font-bold hover:border-blue-500 transition-all uppercase">💼 Business</button>
            <button onclick="FetchByCategory('Tamil Nadu')" class="bg-gray-900 border border-gray-800 px-4 py-2 rounded-xl text-[9px] font-bold hover:border-blue-500 transition-all uppercase">📍 Local</button>
        </div>

        <div id="newsGrid" class="mt-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20">
            </div>
    </main>

    <footer class="p-10 text-center border-t border-gray-900 mt-20 opacity-40">
        <p class="text-[9px] font-bold uppercase tracking-[0.5em]">© 2026 NISHANTH KN | AI&DS | PCE</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
