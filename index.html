<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Reporter - NISHANTH KN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0a0a0a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        @keyframes loading-bar { 0% { transform: translateX(-100%); } 100% { transform: translateX(250%); } }
        .animate-loading-bar { animation: loading-bar 2s ease-in-out infinite; }
    </style>
</head>
<body class="bg-gray-950 text-white font-sans min-h-screen custom-scrollbar">

    <div id="splash-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black transition-opacity duration-700">
        <img src="https://raw.githubusercontent.com/NishanthKn12/AI-NEWS-REPORTER/main/logo.png" 
             class="w-24 h-24 mb-6 animate-bounce" 
             onerror="this.src='https://cdn-icons-png.flaticon.com/512/3820/3820177.png'">
        <h1 class="text-2xl font-black text-blue-500 tracking-tighter uppercase">AI NEWS REPORTER</h1>
        <p class="text-gray-500 text-[9px] mt-2 uppercase tracking-widest">Developed by NISHANTH KN</p>
        <div class="w-48 h-1 bg-gray-900 rounded-full mt-8 overflow-hidden">
            <div class="h-full bg-blue-600 animate-loading-bar"></div>
        </div>
    </div>

    <header class="p-4 bg-black border-b border-gray-900 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://raw.githubusercontent.com/NishanthKn12/AI-NEWS-REPORTER/main/logo.png" 
                     class="w-10 h-10 object-contain" 
                     onerror="this.src='https://cdn-icons-png.flaticon.com/512/3820/3820177.png'">
                <h1 class="text-lg font-black text-blue-500 tracking-tighter uppercase italic">AI NEWS</h1>
            </div>
            <div class="flex items-center gap-3 bg-gray-900/50 p-2 px-4 rounded-2xl border border-gray-800">
                <div class="text-right hidden sm:block">
                    <p class="text-[8px] text-blue-400 font-bold uppercase">Developer</p>
                    <p class="text-[10px] font-black uppercase">NISHANTH KN</p>
                </div>
                <img src="https://raw.githubusercontent.com/NishanthKn12/AI-NEWS-REPORTER/main/profile.png" 
                     class="w-9 h-9 rounded-full border-2 border-blue-600 object-cover shadow-lg"
                     onerror="this.src='https://via.placeholder.com/100'">
            </div>
        </div>
    </header>

    <main class="p-4 md:p-8 max-w-7xl mx-auto">
        <div class="max-w-3xl mx-auto mb-10">
            <div class="flex items-center bg-gray-900 border border-gray-800 rounded-3xl p-2 shadow-2xl focus-within:border-blue-500 transition-all mb-8">
                <input type="text" id="searchInput" placeholder="Search topics (AI, Cricket, Space)..." 
                       class="flex-1 bg-transparent px-4 outline-none text-sm font-medium">
                <button onclick="startVoiceSearch()" id="micBtn" class="p-3 text-gray-400 hover:text-blue-500 transition-all">
                    <i class="fas fa-microphone"></i>
                </button>
                <button onclick="FetchNews()" class="bg-blue-600 px-8 py-3 rounded-2xl font-black text-xs uppercase hover:bg-blue-700 shadow-lg shadow-blue-600/30 transition-all">Search</button>
            </div>

            <div class="flex flex-wrap gap-2 justify-center">
                <button onclick="FetchByCategory('Technology')" class="bg-gray-900 px-5 py-2.5 rounded-2xl text-[10px] font-black border border-gray-800 hover:border-blue-500 transition-all">💻 TECH</button>
                <button onclick="FetchByCategory('Sports')" class="bg-gray-900 px-5 py-2.5 rounded-2xl text-[10px] font-black border border-gray-800 hover:border-green-500 transition-all">🏆 SPORTS</button>
                <button onclick="FetchByCategory('Business')" class="bg-gray-900 px-5 py-2.5 rounded-2xl text-[10px] font-black border border-gray-800 hover:border-yellow-500 transition-all">💼 BUSINESS</button>
                <button onclick="FetchByCategory('Tamil Nadu')" class="bg-gray-900 px-5 py-2.5 rounded-2xl text-[10px] font-black border border-gray-800 hover:border-red-500 transition-all">📍 LOCAL</button>
            </div>
        </div>

        <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <footer class="p-10 text-center border-t border-gray-900 mt-20">
        <p class="text-[9px] text-gray-600 font-black uppercase tracking-[0.4em]">© 2026 AI NEWS REPORTER | NISHANTH KN</p>
    </footer>

    <script>
        const GEMINI_API_KEY = 'AlzaSyCTheqaqkuuScbCqPpiyakI5NA1ZRuRRk';

        // Fix: Force removal of Splash Screen on Load
        window.addEventListener('load', () => {
            console.log("Loading logic started.");
            const splash = document.getElementById('splash-screen');
            setTimeout(() => {
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    FetchNews('Technology'); // 2.5s wait correctly loads initial news
                }, 700);
            }, 2500);
        });

        async function FetchNews(forcedQuery) {
            let query = forcedQuery || document.getElementById('searchInput').value || 'Technology';
            const grid = document.getElementById('newsGrid');

            grid.innerHTML = `<div class="col-span-full text-center py-20"><p class="text-blue-400 animate-pulse font-bold uppercase tracking-widest">AI SYNCING: ${query.toUpperCase()}</p></div>`;

            try {
                const ts = new Date().getTime();
                // FIXED: https:// protocol ensured
                const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=ta&gl=IN&ceid=IN:ta`;
                const rssToJson = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&nocache=${ts}`;

                const response = await fetch(rssToJson);
                const data = await response.json();

                if (data.status === 'ok' && data.items) {
                    displayNews(data.items.slice(0, 15));
                } else {
                    grid.innerHTML = `<p class="col-span-full text-center py-20 text-gray-400 uppercase font-black">No news found for "${query}"</p>`;
                }
            } catch (e) {
                console.error(e);
                grid.innerHTML = `<p class="col-span-full text-center py-20 text-red-500 uppercase font-black">Network Busy.</p>`;
            }
        }

        function displayNews(articles) {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = '';
            articles.forEach(article => {
                const safeTitle = article.title.replace(/'/g, "").replace(/"/g, "");
                const keywords = safeTitle.split(' ').slice(0, 2).join(',');
                const img = `https://loremflickr.com/400/250/${encodeURIComponent(keywords)}?lock=${Math.random()}`;

                grid.innerHTML += `
                    <div class="bg-gray-900 border border-gray-800 p-5 rounded-3xl hover:border-blue-500 transition-all flex flex-col group shadow-xl">
                        <img src="${img}" class="w-full h-44 object-cover rounded-2xl mb-4 group-hover:scale-105 transition-all" onerror="this.src='https://raw.githubusercontent.com/NishanthKn12/AI-NEWS-REPORTER/main/logo.png'">
                        <h3 class="font-bold text-sm mb-4 line-clamp-2 text-gray-100">${article.title}</h3>
                        <div class="flex justify-between items-center mb-4">
                            <a href="${article.link}" target="_blank" class="text-blue-400 text-[10px] underline font-black">SOURCE</a>
                            <button onclick="saveToSQL('${safeTitle}', '${article.link}', '${article.pubDate}')" class="text-yellow-500 text-[10px] font-bold border border-yellow-500 px-2 py-1 rounded-lg">⭐ SAVE SQL</button>
                        </div>
                        <button onclick="getAiSummary(this, '${safeTitle}')" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-2xl text-[10px] font-black transition-all shadow-lg">✨ GET AI TAMIL SUMMARY</button>
                    </div>`;
            });
        }

        async function getAiSummary(btn, title) {
            const original = btn.innerHTML;
            btn.innerText = "🤖 ANALYZING...";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Summarize in 2 lines simple Tamil: ${title}` }] }] })
                });
                const d = await res.json();
                const summary = d.candidates[0].content.parts[0].text;
                
                // Optional Tamil Voice Synthesis
                const speech = new SpeechSynthesisUtterance(summary);
                speech.lang = 'ta-IN';
                window.speechSynthesis.speak(speech);
                
                alert("AI TAMIL REPORT:\n\n" + summary);
            } catch (e) { alert("AI Busy!"); }
            btn.innerHTML = original;
        }

        function FetchByCategory(cat) {
            document.getElementById('searchInput').value = cat;
            FetchNews(cat);
        }

        function startVoiceSearch() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Mic not supported");
            const rec = new SpeechRecognition();
            rec.onresult = (e) => {
                const text = e.results[0][0].transcript;
                document.getElementById('searchInput').value = text;
                FetchNews(text);
            };
            rec.start();
        }

        async function saveToSQL(title, link, pubDate) {
            try {
                // Fixed localhost logic for SQL connection
                await fetch('http://localhost:5000/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, link, pub_date: pubDate })
                });
                alert("News Saved to Database!");
            } catch (e) { alert(" Flask Server (app.py) run aagudha-nu check pannunga!"); }
        }
    </script>
</body>
</html>
