<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Reporter - NISHANTH KN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        #splash-screen { transition: opacity 0.5s ease-out; }
    </style>
</head>
<body class="bg-[#050505] text-white min-h-screen font-sans">

    <div id="splash-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black">
        <h1 class="text-2xl font-black text-blue-500 tracking-tighter uppercase italic">AI NEWS REPORTER</h1>
        <p class="text-gray-500 text-[10px] mt-2 uppercase tracking-widest font-bold">DEVELOPED BY NISHANTH KN</p>
        <div class="w-48 h-1 bg-gray-900 rounded-full mt-8 overflow-hidden">
            <div id="progress-bar" class="h-full bg-blue-600 w-0 transition-all duration-300"></div>
        </div>
    </div>

    <div id="main-content" class="opacity-0 transition-opacity duration-700">
        
        <header class="p-4 bg-black/50 backdrop-blur-md sticky top-0 z-50 border-b border-gray-900">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <span class="text-2xl">🤖</span>
                    <h1 class="text-lg font-black text-blue-500 uppercase italic tracking-tighter">AI NEWS REPORTER</h1>
                </div>
                
                <div class="flex items-center gap-3 bg-gray-900/80 p-1.5 pr-4 rounded-3xl border border-gray-800 shadow-xl">
                    <div class="text-right leading-none hidden sm:block pl-2">
                        <p class="text-[7px] text-blue-400 font-bold uppercase">DEVELOPED BY:</p>
                        <p class="text-[10px] font-black uppercase tracking-tight">NISHANTH KN</p>
                    </div>
                    <img src="https://raw.githubusercontent.com/nishanthnishanth27/AI-NEWS-REPORTER/main/profile.png" 
                         class="w-10 h-10 rounded-full border-2 border-blue-600 object-cover shadow-blue-900/20"
                         onerror="this.src='https://ui-avatars.com/api/?name=Nishanth+KN&background=0D8ABC&color=fff'">
                </div>
            </div>
        </header>

        <main class="p-4 max-w-5xl mx-auto">
            
            <div class="bg-[#0f1115] border border-gray-800 p-3 rounded-[40px] shadow-2xl mt-6 flex items-center gap-3">
                <input type="text" id="searchInput" placeholder="Search topics (AI, Cricket, Space)..." 
                       class="flex-1 bg-transparent px-4 outline-none text-gray-300 text-sm">
                <i class="fas fa-microphone text-gray-500 mr-2 cursor-pointer hover:text-blue-500"></i>
                <button onclick="FetchNews()" class="bg-blue-600 hover:bg-blue-700 px-8 py-3 rounded-[30px] font-black text-xs uppercase shadow-lg shadow-blue-600/20 transition-all">Search</button>
            </div>

            <div class="flex flex-wrap gap-3 justify-center mt-8">
                <button onclick="FetchNews('Technology')" class="bg-gray-900/50 border border-gray-800 px-5 py-2.5 rounded-2xl text-[10px] font-black hover:border-blue-500 transition-all">💻 TECH</button>
                <button onclick="FetchNews('Sports')" class="bg-gray-900/50 border border-gray-800 px-5 py-2.5 rounded-2xl text-[10px] font-black hover:border-blue-500 transition-all">🏆 SPORTS</button>
                <button onclick="FetchNews('Business')" class="bg-gray-900/50 border border-gray-800 px-5 py-2.5 rounded-2xl text-[10px] font-black hover:border-blue-500 transition-all">💼 BUSINESS</button>
                <button onclick="FetchNews('Tamil Nadu')" class="bg-gray-900/50 border border-gray-800 px-5 py-2.5 rounded-2xl text-[10px] font-black hover:border-blue-500 transition-all">📍 LOCAL</button>
            </div>

            <div id="newsGrid" class="mt-12 grid grid-cols-1 md:grid-cols-2 gap-8">
                </div>
        </main>
    </div>

    <script>
        const API_KEY = 'AlzaSyCTheqaqkuuScbCqPpiyakI5NA1ZRuRRk';

        // Splash Loader Logic
        window.onload = () => {
            let prog = 0;
            const bar = document.getElementById('progress-bar');
            const interval = setInterval(() => {
                prog += 5;
                bar.style.width = prog + '%';
                if(prog >= 100) {
                    clearInterval(interval);
                    document.getElementById('splash-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('splash-screen').style.display = 'none';
                        document.getElementById('main-content').classList.remove('opacity-0');
                        FetchNews('Latest Technology');
                    }, 500);
                }
            }, 50);
        };

        async function FetchNews(query) {
            const searchTerm = query || document.getElementById('searchInput').value || 'Technology';
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = `<div class="col-span-full text-center py-20 text-blue-500 font-black animate-pulse uppercase tracking-widest">⚡ Fetching Global Intelligence...</div>`;

            try {
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss/search?q=${encodeURIComponent(searchTerm)}&hl=en-IN&gl=IN&ceid=IN:en`);
                const data = await response.json();
                
                if (data.status === 'ok') {
                    grid.innerHTML = '';
                    data.items.forEach(item => {
                        const date = new Date(item.pubDate).toLocaleDateString('en-IN', {day: '2-digit', month: 'short', year: 'numeric'});
                        grid.innerHTML += `
                            <div class="bg-[#0f1115] border border-gray-800 p-5 rounded-[32px] hover:border-blue-600 transition-all group shadow-xl">
                                <img src="https://source.unsplash.com/800x450/?technology,ai&sig=${Math.random()}" class="w-full h-52 object-cover rounded-2xl mb-5 group-hover:scale-[1.02] transition-transform">
                                <div class="flex items-center gap-2 text-[9px] font-bold text-gray-500 uppercase mb-3">
                                    <span class="text-blue-500">📅 ${date}</span>
                                </div>
                                <h3 class="font-black text-sm mb-6 leading-tight line-clamp-2 uppercase tracking-tighter">${item.title}</h3>
                                <div class="flex flex-col gap-3">
                                    <a href="${item.link}" target="_blank" class="text-center text-blue-400 text-[9px] font-black uppercase tracking-widest hover:underline">Read Full Story</a>
                                    <button onclick="getSummary(this, '${item.title.replace(/'/g, "")}')" 
                                            class="w-full bg-blue-600 py-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] shadow-lg shadow-blue-600/20">✨ AI Summary</button>
                                </div>
                            </div>`;
                    });
                }
            } catch (e) {
                grid.innerHTML = `<p class="text-red-500 text-center col-span-full">Network Error. Check Internet.</p>`;
            }
        }

        async function getSummary(btn, title) {
            const oldText = btn.innerText;
            btn.innerText = "🤖 ANALYZING...";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Summarize in 2 short lines in simple Tamil: ${title}` }] }] })
                });
                const data = await res.json();
                alert("✨ AI TAMIL SUMMARY:\n\n" + data.candidates[0].content.parts[0].text);
            } catch (e) {
                alert("AI Engine busy! Try again.");
            }
            btn.innerText = oldText;
        }
    </script>
</body>
</html>
