<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Reporter Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">
    <nav class="p-5 bg-black border-b border-gray-800 text-center text-2xl font-bold text-blue-500">
        AI NEWS REPORTER
    </nav>
    
    <div class="p-5 max-w-4xl mx-auto">
        <!-- Search & Filters -->
        <div class="flex gap-2 mb-8">
            <input type="text" id="searchInput" placeholder="Search AI news..." class="flex-1 p-3 rounded bg-gray-800 border border-gray-700 focus:outline-none focus:border-blue-500">
            <button onclick="fetchNews()" class="bg-blue-600 px-6 py-3 rounded font-bold hover:bg-blue-700">Search</button>
        </div>

        <!-- News Container -->
        <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- News Cards will appear here -->
            <p class="text-center text-gray-500">Fetching latest news...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
