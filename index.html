<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="app.webmanifest">
    <title>AI News Reporter Pro - NISHANTH KN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-950 text-white font-sans min-h-screen">

    <nav class="p-4 bg-black border-b border-blue-900/30 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter text-blue-500 flex items-center gap-2">🤖 AI NEWS REPORTER</h1>
            <div class="bg-gray-900/50 p-2 rounded-full border border-gray-800 text-[10px] font-bold px-4">
                <span class="text-blue-400">DEV:</span> NISHANTH KN
            </div>
        </div>
    </nav>

    <div class="p-6 max-w-4xl mx-auto">
        <div class="flex gap-2 bg-gray-900 p-2 rounded-2xl border border-gray-800 focus-within:border-blue-500 items-center">
            <input type="text" id="searchInput" placeholder="Search topics (AI, Cricket)..." class="flex-1 bg-transparent p-3 outline-none text-gray-200">
            <button onclick="startVoiceSearch()" id="micBtn" class="p-3 text-gray-400 hover:text-blue-500 text-xl">🎤</button>
            <button onclick="FetchNews()" class="bg-blue-600 px-6 py-2 rounded-xl font-bold hover:bg-blue-700">Search</button>
        </div>

        <div class="flex flex-wrap justify-center gap-3 mt-6">
            <button onclick="FetchByCategory('Technology')" class="px-4 py-2 bg-gray-900 text-blue-400 rounded-full border border-gray-800 hover:border-blue-500 text-xs font-bold uppercase">💻 Tech</button>
            <button onclick="FetchByCategory('Sports')" class="px-4 py-2 bg-gray-900 text-green-400 rounded-full border border-gray-800 hover:border-green-500 text-xs font-bold uppercase">🏆 Sports</button>
            <button onclick="FetchByCategory('Tamil Nadu')" class="px-4 py-2 bg-gray-900 text-red-400 rounded-full border border-gray-800 hover:border-red-500 text-xs font-bold uppercase">📍 Local</button>
            <button onclick="FetchByCategory('Cinema')" class="px-4 py-2 bg-gray-900 text-purple-400 rounded-full border border-gray-800 hover:border-purple-500 text-xs font-bold uppercase">🎬 Cinema</button>
        </div>
    </div>

    <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 p-6 max-w-7xl mx-auto">
        <div class="col-span-full text-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-4"></div>
            <p class="text-gray-500 font-mono">📡 BOOTING AI ENGINE...</p>
        </div>
    </div>

    <footer class="p-10 text-center text-gray-600 text-xs border-t border-gray-900 mt-10">
        &copy; 2026 NISHANTH KN | Paavai College of Engineering
    </footer>

    <script src="script.js"></script>
</body>
</html>
