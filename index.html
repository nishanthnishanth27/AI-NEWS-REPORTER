<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Reporter - NISHANTH KN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        #splash-screen { transition: opacity 0.8s ease-out; z-index: 1000; }
        
        @keyframes loading-bar { 0% { transform: translateX(-100%); } 100% { transform: translateX(250%); } }
        .animate-loading-bar { animation: loading-bar 2s ease-in-out infinite; }
        
        #sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 500; }
        .sidebar-open { transform: translateX(0); }
        .sidebar-closed { transform: translateX(-100%); }
        
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; animation: marquee 30s linear infinite; }

        /* Shorts Styles */
        #videoContainer::-webkit-scrollbar { display: none; }
        .video-card {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            background: #000;
        }
        .video-card iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="bg-[#050505] text-white min-h-screen font-sans overflow-x-hidden">

    <div id="splash-screen" class="fixed inset-0 flex flex-col items-center justify-center bg-black">
        <h1 class="text-2xl font-black text-blue-500 tracking-tighter uppercase italic">AI NEWS REPORTER</h1>
        <p class="text-gray-500 text-[10px] mt-2 uppercase tracking-widest font-bold">DEVELOPED BY NISHANTH KN</p>
        <div class="w-48 h-1 bg-gray-900 rounded-full mt-8 overflow-hidden">
            <div class="h-full bg-blue-600 animate-loading-bar"></div>
        </div>
    </div>

    <div id="videoOverlay" class="fixed inset-0 bg-black z-[600] hidden flex-col">
        <div class="p-4 flex justify-between items-center bg-gradient-to-b from-black to-transparent absolute top-0 w-full z-[610]">
            <h2 class="text-white font-black italic tracking-tighter">AI SHORTS NEWS</h2>
            <button onclick="closeShorts()" class="w-10 h-10 bg-white/10 rounded-full text-white flex items-center justify-center">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div id="videoContainer" class="flex-1 overflow-y-scroll snap-y snap-mandatory scroll-smooth">
            </div>
    </div>

    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[450] hidden opacity-0"></div>

    <div id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-[#0a0a0a] border-r border-gray-900 shadow-2xl sidebar-closed flex flex-col p-6">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-blue-500 font-black italic tracking-widest">DASHBOARD</h2>
            <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white transition-colors">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <div class="flex flex-col items-center mb-8 border-b border-gray-800 pb-8">
            <div class="relative">
                <img src="https://raw.githubusercontent.com/nishanthnishanth27/AI-NEWS-REPORTER/main/profile.png" 
                     class="w-24 h-24 rounded-full border-2 border-blue-600 object-cover p-1"
                     onerror="this.src='https://ui-avatars.com/api/?name=Nishanth+KN&background=000&color=fff'">
                <div class="absolute bottom-1 right-1 w-4 h-4 bg-green-500 border-2 border-black rounded-full"></div>
            </div>
            <h3 class="font-bold text-lg mt-4 uppercase">NISHANTH KN</h3>
            <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest mt-1">DATA SCIENTIST</p>
        </div>

        <nav class="space-y-2 flex-1">
            <button onclick="openShorts()" class="w-full flex items-center gap-4 p-4 rounded-2xl bg-red-600/10 border border-red-600/20 text-red-500 transition-all group">
                <i class="fas fa-play-circle animate-pulse"></i> 
                <span class="text-xs font-black uppercase tracking-widest">AI Shorts (Tamil)</span>
            </button>
            
            <button onclick="toggleSidebar()" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-blue-600/10 hover:text-blue-400 transition-all group">
                <i class="fas fa-user-circle text-gray-500 group-hover:text-blue-400"></i> 
                <span class="text-xs font-black uppercase tracking-widest">My Profile</span>
            </button>
            <button onclick="showAbout()" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-blue-600/10 hover:text-blue-400 transition-all group">
                <i class="fas fa-info-circle text-gray-500 group-hover:text-blue-400"></i> 
                <span class="text-xs font-black uppercase tracking-widest">About App</span>
            </button>
        </nav>

        <div class="mt-8 px-2">
            <p class="text-[8px] font-black uppercase tracking-[0.2em] text-gray-600 mb-3 px-2">News Language</p>
            <div class="flex bg-gray-900/50 p-1 rounded-xl border border-gray-800">
                <button id="langEn" onclick="changeLanguage('en')" class="flex-1 py-2 text-[9px] font-black rounded-lg transition-all bg-blue-600 text-white">ENGLISH</button>
                <button id="langTa" onclick="changeLanguage('ta')" class="flex-1 py-2 text-[9px] font-black rounded-lg transition-all text-gray-500 hover:text-white">TAMIL</button>
            </div>
        </div>
    </div>

    <header class="p-4 bg-black/60 backdrop-blur-xl sticky top-0 z-[100] border-b border-gray-900">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center bg-gray-900 rounded-xl text-blue-500 hover:bg-blue-600 hover:text-white transition-all">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="text-lg font-black text-blue-500 uppercase italic tracking-tighter">AI NEWS REPORTER</h1>
            </div>
            <div class="flex items-center gap-3 bg-gray-900/50 p-1.5 pr-4 rounded-full border border-gray-800">
                <img src="https://raw.githubusercontent.com/nishanthnishanth27/AI-NEWS-REPORTER/main/profile.png" class="w-8 h-8 rounded-full border border-blue-600" onerror="this.src='https://ui-avatars.com/api/?name=NK'">
                <p class="text-[9px] font-black uppercase tracking-widest hidden sm:block">Nishanth</p>
            </div>
        </div>
    </header>

    <div class="bg-blue-600/10 border-y border-blue-900/30 py-2.5 overflow-hidden whitespace-nowrap sticky top-[72px] z-40 backdrop-blur-md">
        <div class="inline-block animate-marquee">
            <span class="text-[10px] font-black text-blue-500 uppercase italic mx-4">⚡ முக்கியச் செய்தி: ஜெமினி AI மூலம் செய்திகளின் சுருக்கம் உடனுக்குடன்..</span>
            <span class="text-[10px] font-black text-white uppercase italic mx-4">🌍 உலகம்: சர்வதேச செய்திகள் இப்போது உங்கள் தமிழில்..</span>
        </div>
    </div>

    <main class="p-4 max-w-6xl mx-auto">
        <div class="bg-[#0f1115] border border-gray-800 p-2 rounded-full shadow-2xl mt-8 flex items-center gap-2 max-w-2xl mx-auto focus-within:border-blue-600">
            <input type="text" id="searchInput" placeholder="Search news, topics, tech..." class="flex-1 bg-transparent px-5 outline-none text-gray-300 text-sm">
            <button onclick="startVoiceSearch()" id="micBtn" class="p-3 text-gray-500 hover:text-blue-500"><i class="fas fa-microphone"></i></button>
            <button onclick="FetchNews()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-full font-black text-[10px] uppercase shadow-lg">Search</button>
        </div>

        <div class="flex flex-wrap gap-2 justify-center mt-8">
            <button onclick="FetchByCategory('Technology')" class="bg-gray-900 border border-gray-800 px-4 py-2 rounded-xl text-[9px] font-bold hover:border-blue-500 uppercase">💻 Technology</button>
            <button onclick="FetchByCategory('Sports')" class="bg-gray-900 border border-gray-800 px-4 py-2 rounded-xl text-[9px] font-bold hover:border-blue-500 uppercase">🏆 Sports</button>
            <button onclick="FetchByCategory('Local')" class="bg-gray-900 border border-gray-800 px-4 py-2 rounded-xl text-[9px] font-bold hover:border-blue-500 uppercase">📍 Local</button>
        </div>

        <div id="newsGrid" class="mt-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
