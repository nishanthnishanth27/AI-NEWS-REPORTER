<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="app.webmanifest">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="app.webmanifest">
    <title>AI News Reporter Pro - NISHANTH KN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Logo Background Logic */
        .logo-bg {
            background: linear-gradient(rgba(10, 10, 10, 0.85), rgba(10, 10, 10, 0.95)), 
                        url('https://raw.githubusercontent.com/nishanthnishanth27/AI-NEWS-REPORTER/main/logo.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        @keyframes loading-bar {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(250%); }
        }
        .animate-loading-bar { animation: loading-bar 2s ease-in-out infinite; }
    </style>
</head>
<body class="bg-gray-950 text-white font-sans min-h-screen">

    <nav class="p-4 bg-black border-b border-blue-900/30 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter text-blue-500">🤖 AI NEWS REPORTER</h1>
            <div class="flex items-center gap-3 bg-gray-900/80 p-1.5 pr-4 rounded-full border border-gray-800">
                <img src="https://raw.githubusercontent.com/nishanthnishanth27/AI-NEWS-REPORTER/main/profile.png" 
                     class="w-10 h-10 rounded-full border-2 border-blue-500 object-cover"
                     onerror="this.src='https://ui-avatars.com/api/?name=Nishanth&background=007bff&color=fff'">
                <div class="text-[10px] text-right leading-none">
                    <p class="font-bold text-blue-400 uppercase mb-1">Developed by:</p>
                    <p class="font-bold text-white">NISHANTH KN</p>
                </div>
            </div>
        </div>
    </nav>

    <div class="p-6 max-w-4xl mx-auto">
        <div class="flex gap-2 bg-gray-900 p-2 rounded-2xl border border-gray-800 focus-within:border-blue-500 items-center">
            <input type="text" id="searchInput" placeholder="Search topics..." class="flex-1 bg-transparent p-3 outline-none">
            <button onclick="startVoiceSearch()" id="micBtn" class="p-3 text-gray-400 text-xl">🎤</button>
            <button onclick="FetchNews()" class="bg-blue-600 px-6 py-2 rounded-xl font-bold">Search</button>
        </div>

        <div class="flex flex-wrap justify-center gap-3 mt-6">
            <button onclick="FetchByCategory('Technology')" class="px-4 py-2 bg-gray-900 text-blue-400 rounded-full border border-gray-800 font-bold text-xs uppercase">💻 Tech</button>
            <button onclick="FetchByCategory('Sports')" class="px-4 py-2 bg-gray-900 text-green-400 rounded-full border border-gray-800 font-bold text-xs uppercase">🏆 Sports</button>
            <button onclick="FetchByCategory('Business')" class="px-4 py-2 bg-gray-900 text-yellow-400 rounded-full border border-gray-800 font-bold text-xs uppercase">💼 Business</button>
            <button onclick="FetchByCategory('Tamil Nadu')" class="px-4 py-2 bg-gray-900 text-red-400 rounded-full border border-gray-800 font-bold text-xs uppercase">📍 Local</button>
            <button onclick="FetchByCategory('Cinema')" class="px-4 py-2 bg-gray-900 text-purple-400 rounded-full border border-gray-800 font-bold text-xs uppercase">🎬 Cinema</button>
            <button onclick="FetchByCategory('Education')" class="px-4 py-2 bg-gray-900 text-pink-400 rounded-full border border-gray-800 font-bold text-xs uppercase">📚 Edu</button>
        </div>
    </div>

    <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 p-6 max-w-7xl mx-auto min-h-[50vh] logo-bg rounded-[40px]">
        <div class="col-span-full flex flex-col items-center justify-center py-20 gap-6">
            <img src="https://raw.githubusercontent.com/nishanthnishanth27/AI-NEWS-REPORTER/main/logo.png" class="w-48 opacity-40 shadow-blue-500/20">
            <div class="text-center">
                <p class="text-[10px] font-black uppercase tracking-[0.3em] text-blue-500 animate-pulse">Initializing AI Engine...</p>
                <div class="w-48 h-1 bg-gray-800 rounded-full overflow-hidden mx-auto mt-4">
                    <div class="h-full bg-blue-600 animate-loading-bar" style="width: 30%;"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="p-10 text-center text-gray-600 text-[10px] uppercase tracking-widest mt-10 border-t border-gray-900">
        &copy; 2026 NISHANTH KN | Paavai College of Engineering
    </footer>

    <script src="script.js"></script>
</body>
</html>
