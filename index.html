<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Reporter - NISHANTH KN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        @keyframes loading-bar { 0% { transform: translateX(-100%); } 100% { transform: translateX(250%); } }
        .animate-loading-bar { animation: loading-bar 2s ease-in-out infinite; }
        #splash-screen { transition: opacity 0.8s ease-out; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">

    <div id="splash-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black">
        <div class="relative">
            <div class="w-24 h-24 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <i class="fas fa-robot text-blue-500 text-4xl absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></i>
        </div>
        <h1 class="text-2xl font-black text-blue-500 mt-6 tracking-tighter">AI NEWS REPORTER</h1>
        <p class="text-gray-500 text-[10px] mt-2 uppercase tracking-widest">NISHANTH KN PROJECT</p>
    </div>

    <div id="main-content" class="opacity-0 transition-opacity duration-1000">
        
        <header class="p-4 bg-black border-b border-gray-900 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <i class="fas fa-bolt text-blue-600 text-xl"></i>
                    <h1 class="text-lg font-black text-blue-500 uppercase italic">AI NEWS REPORTER</h1>
                </div>
                
                <div class="flex items-center gap-3 bg-gray-900 p-1 pr-4 rounded-full border border-gray-800">
                    <img src="https://raw.githubusercontent.com/nishanthnishanth27/AI-NEWS-REPORTER/main/profile.png" 
                         class="w-10 h-10 rounded-full border-2 border-blue-600 object-cover"
                         alt="Profile"
                         onerror="this.src='https://ui-avatars.com/api/?name=Nishanth+KN&background=0D8ABC&color=fff'">
                    <span class="text-[10px] font-bold text-gray-300 hidden sm:block">NISHANTH KN</span>
                </div>
            </div>
        </header>

        <main class="p-6 max-w-7xl mx-auto">
            <div class="max-w-2xl mx-auto mb-10">
                <div class="flex gap-2 bg-gray-900 p-2 rounded-2xl border border-gray-800 focus-within:border-blue-500 mb-6">
                    <input type="text" id="searchInput" placeholder="Search technology news..." 
                           class="flex-1 bg-transparent px-4 outline-none text-sm">
                    <button onclick="FetchNews()" class="bg-blue-600 px-6 py-2 rounded-xl font-bold text-xs uppercase">Search</button>
                </div>
                
                <div class="flex flex-wrap gap-2 justify-center">
                    <button onclick="FetchNews('AI')" class="bg-gray-900 px-4 py-2 rounded-lg text-[10px] font-bold border border-gray-800 hover:bg-blue-600">#AI</button>
                    <button onclick="FetchNews('Python')" class="bg-gray-900 px-4 py-2 rounded-lg text-[10px] font-bold border border-gray-800 hover:bg-blue-600">#PYTHON</button>
                    <button onclick="FetchNews('Gadgets')" class="bg-gray-900 px-4 py-2 rounded-lg text-[10px] font-bold border border-gray-800 hover:bg-blue-600">#TECH</button>
                </div>
            </div>

            <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </main>
    </div>

    <script>
        // API KEY (Check if active)
        const API_KEY = 'AlzaSyCTheqaqkuuScbCqPpiyakI5NA1ZRuRRk';

        // 1. SPLASH HIDE LOGIC (Forcefully shows app after 3s)
        window.addEventListener('load', hideSplash);
        setTimeout(hideSplash, 3000); // Fail-safe timer

        function hideSplash() {
            const splash = document.getElementById('splash-screen');
            const main = document.getElementById('main-content');
            if(splash.style.display !== 'none') {
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    main.classList.remove('opacity-0');
                    FetchNews('Latest Technology');
                }, 800);
            }
        }

        // 2. FETCH NEWS LOGIC
        async function FetchNews(query) {
            const searchTerm = query || document.getElementById('searchInput').value || 'Technology';
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = `<p class="col-span-full text-center text-blue-500 animate-pulse">📡 FETCHING LATEST NEWS...</p>`;

            try {
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss/search?q=${encodeURIComponent(searchTerm)}&hl=en-IN&gl=IN&ceid=IN:en`);
                const data = await response.json();
                
                if (data.status === 'ok') {
                    grid.innerHTML = '';
                    data.items.forEach(item => {
                        grid.innerHTML += `
                            <div class="bg-gray-900 border border-gray-800 p-4 rounded-2xl hover:border-blue-500 transition-all flex flex-col">
                                <img src="https://loremflickr.com/400/200/tech?random=${Math.random()}" class="rounded-xl mb-4 h-40 object-cover">
                                <h3 class="font-bold text-sm mb-4 line-clamp-2">${item.title}</h3>
                                <div class="mt-auto">
                                    <a href="${item.link}" target="_blank" class="text-blue-400 text-[10px] font-bold uppercase mb-4 block">Read Source</a>
                                    <button onclick="getSummary(this, '${item.title.replace(/'/g, "")}')" 
                                            class="w-full bg-blue-600 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest">✨ AI Summary</button>
                                </div>
                            </div>`;
                    });
                }
            } catch (e) {
                grid.innerHTML = `<p class="text-red-500 col-span-full text-center">Failed to load news. Check connection.</p>`;
            }
        }

        // 3. AI SUMMARY LOGIC (Gemini)
        async function getSummary(btn, title) {
            const originalText = btn.innerText;
            btn.innerText = "🤖 ANALYZING...";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Summarize this tech news in 2 lines of simple Tamil: ${title}` }] }] })
                });
                const data = await res.json();
                alert("AI TAMIL SUMMARY:\n\n" + data.candidates[0].content.parts[0].text);
            } catch (e) {
                alert("AI Summarizer is currently busy!");
            }
            btn.innerText = originalText;
        }
    </script>
</body>
</html>
