<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Reporter - NISHANTH KN</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        #splash-screen { transition: opacity 0.8s ease-out; }

        @keyframes loading-bar {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(250%); }
        }
        .animate-loading-bar { animation: loading-bar 2s ease-in-out infinite; }
    </style>
</head>

<body class="bg-[#050505] text-white min-h-screen font-sans">

<!-- Splash -->
<div id="splash-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black">
    <h1 class="text-2xl font-black text-blue-500 uppercase italic">AI NEWS REPORTER</h1>
    <p class="text-gray-500 text-[10px] mt-2 uppercase">DEVELOPED BY NISHANTH KN</p>

    <div class="w-48 h-1 bg-gray-900 rounded-full mt-8 overflow-hidden">
        <div class="h-full bg-blue-600 animate-loading-bar"></div>
    </div>
</div>

<!-- Header -->
<header class="p-4 bg-black/50 backdrop-blur-md sticky top-0 z-50 border-b border-gray-900">
    <div class="max-w-7xl mx-auto flex justify-between items-center">

        <div class="flex items-center gap-3">
            <span class="text-2xl">🤖</span>
            <h1 class="text-lg font-black text-blue-500 uppercase italic">AI NEWS REPORTER</h1>
        </div>

        <div class="flex items-center gap-3 bg-gray-900 p-2 rounded-3xl border border-gray-800">
            <div class="text-right hidden sm:block">
                <p class="text-[8px] text-blue-400">DEVELOPED BY</p>
                <p class="text-[10px] font-bold">NISHANTH KN</p>
            </div>

            <!-- ✅ FIXED IMAGE TAG -->
            <img src="https://raw.githubusercontent.com/nishanthnishanth27/AI-NEWS-REPORTER/main/profile.png"
                 class="w-10 h-10 rounded-full border-2 border-blue-600 object-cover">
        </div>

    </div>
</header>

<!-- Main -->
<main class="p-4 max-w-6xl mx-auto">

    <!-- Search -->
    <div class="bg-[#0f1115] border border-gray-800 p-3 rounded-[40px] mt-6 flex items-center gap-3 max-w-3xl mx-auto">
        <input type="text" id="searchInput" placeholder="Search topics..."
               class="flex-1 bg-transparent px-4 outline-none text-gray-300">

        <button onclick="startVoiceSearch()" id="micBtn" class="p-3 text-gray-500 hover:text-blue-500">
            <i class="fas fa-microphone"></i>
        </button>

        <button onclick="FetchNews()" class="bg-blue-600 px-6 py-3 rounded-full text-xs font-bold">
            Search
        </button>
    </div>

    <!-- Categories -->
    <div class="flex flex-wrap gap-3 justify-center mt-8">
        <button onclick="FetchByCategory('Technology')" class="btn">💻 TECH</button>
        <button onclick="FetchByCategory('Sports')" class="btn">🏆 SPORTS</button>
        <button onclick="FetchByCategory('Business')" class="btn">💼 BUSINESS</button>
        <button onclick="FetchByCategory('Local')" class="btn">📍 LOCAL</button>
    </div>

    <!-- News -->
    <div id="newsGrid" class="mt-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

</main>

<!-- Footer -->
<footer class="p-10 text-center border-t border-gray-900 mt-20 opacity-50">
    <p class="text-[9px] uppercase">© 2026 NISHANTH KN</p>
</footer>

<script>
const GEMINI_API_KEY = 'AlzaSyCTheqaqkuuScbCqPpiyakl5NA1ZRuRRk';

// Fetch News
async function FetchNews(forcedQuery) {
    let query = forcedQuery || document.getElementById('searchInput').value || 'Technology';
    const grid = document.getElementById('newsGrid');

    if (query === 'Local') query = 'site:tamil.oneindia.com';

    grid.innerHTML = "Loading...";

    try {
        const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=ta-IN&gl=IN&ceid=IN:ta`;
        const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

        const res = await fetch(api);
        const data = await res.json();

        displayNews(data.items.slice(0, 12));

    } catch {
        grid.innerHTML = "Error loading news";
    }
}

// ✅ IST FIX HERE
function displayNews(articles) {
    const grid = document.getElementById('newsGrid');
    grid.innerHTML = '';

    articles.forEach(article => {

        const dateObj = new Date(article.pubDate);

        const timeStr = dateObj.toLocaleTimeString('en-IN', {
            hour: '2-digit',
            minute: '2-digit',
            timeZone: 'Asia/Kolkata'
        });

        const dateStr = dateObj.toLocaleDateString('en-IN', {
            day: '2-digit',
            month: 'short',
            year: 'numeric',
            timeZone: 'Asia/Kolkata'
        });

        grid.innerHTML += `
        <div class="bg-gray-900 p-5 rounded-2xl border border-gray-800">
            <div class="text-xs text-gray-400 mb-2">
                📅 ${dateStr} | 🕒 ${timeStr} IST
            </div>

            <h3 class="text-sm font-bold mb-3">${article.title}</h3>

            <a href="${article.link}" target="_blank" class="text-blue-400 text-xs">Read More</a>
        </div>`;
    });
}

// AI Summary
async function getAiSummary(button, title) {
    button.innerText = "Loading...";
    try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                contents: [{parts: [{text: `Explain in Tamil: ${title}` }]}]
            })
        });

        const data = await res.json();
        alert(data.candidates[0].content.parts[0].text);

    } catch {
        alert("AI error");
    }
    button.innerText = "✨ GET AI TAMIL SUMMARY";
}

// Voice
function startVoiceSearch() {
    const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.onresult = e => {
        const t = e.results[0][0].transcript;
        document.getElementById('searchInput').value = t;
        FetchNews(t);
    };
    rec.start();
}

function FetchByCategory(cat) {
    document.getElementById('searchInput').value = cat;
    FetchNews(cat);
}

// Load
window.onload = () => {
    setTimeout(() => {
        document.getElementById('splash-screen').style.display = 'none';
        FetchNews();
    }, 2000);
};
</script>

</body>
</html>
