<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Reporter - NISHANTH KN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        #splash-screen { transition: opacity 0.8s ease-out; }
        @keyframes loading-bar { 0% { transform: translateX(-100%); } 100% { transform: translateX(250%); } }
        .animate-loading-bar { animation: loading-bar 2s ease-in-out infinite; }
    </style>
</head>
<body class="bg-[#050505] text-white min-h-screen font-sans">

    <div id="splash-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black">
        <h1 class="text-2xl font-black text-blue-500 tracking-tighter uppercase italic">AI NEWS REPORTER</h1>
        <p class="text-gray-500 text-[10px] mt-2 uppercase tracking-widest font-bold">DEVELOPED BY NISHANTH KN</p>
        <div class="w-48 h-1 bg-gray-900 rounded-full mt-8 overflow-hidden">
            <div class="h-full bg-blue-600 animate-loading-bar"></div>
        </div>
    </div>

    <header class="p-4 bg-black/50 backdrop-blur-md sticky top-0 z-50 border-b border-gray-900">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🤖</span>
                <h1 class="text-lg font-black text-blue-500 uppercase italic tracking-tighter">AI NEWS REPORTER</h1>
                <div class="flex items-center gap-3 bg-gray-900/80 p-1.5 pr-4 rounded-3xl border border-gray-800 shadow-xl">
            <div class="text-right leading-none hidden sm:block pl-2">
                <p class="text-[7px] text-blue-400 font-serif uppercase tracking-widest">DEVELOPED BY:</p>
                <p class="text-[10px] font-black uppercase tracking-tight">NISHANTH KN</p>
            </div>
            
            <img src="https://raw.githubusercontent.com/nishanthnishanth27/AI-NEWS-REPORTER/main/profile.png" 
                 class="w-10 h-10 rounded-full border-2 border-blue-600 object-cover shadow-blue-900/20"
                <p class="text-[7px] text-blue-400 font-italic uppercase tracking-widest">DEVELOPED BY:NISHANTH KN</p>
                </div>
        </div>
    </header>

    <main class="p-4 max-w-6xl mx-auto">
        
        <div class="bg-[#0f1115] border border-gray-800 p-3 rounded-[40px] shadow-2xl mt-6 flex items-center gap-3 max-w-3xl mx-auto">
            <input type="text" id="searchInput" placeholder="Search topics (AI, Sports, Space)..." 
                   class="flex-1 bg-transparent px-4 outline-none text-gray-300 text-sm">
            <button onclick="startVoiceSearch()" id="micBtn" class="p-3 text-gray-500 hover:text-blue-500 transition-all">
                <i class="fas fa-microphone"></i>
            </button>
            <button onclick="FetchNews()" class="bg-blue-600 hover:bg-blue-700 px-8 py-3 rounded-[30px] font-black text-xs uppercase shadow-lg shadow-blue-600/20 transition-all">Search</button>
        </div>

        <div class="flex flex-wrap gap-3 justify-center mt-8">
            <button onclick="FetchByCategory('Technology')" class="bg-gray-900/50 border border-gray-800 px-5 py-2.5 rounded-2xl text-[10px] font-black hover:border-blue-500 transition-all">💻 TECH</button>
            <button onclick="FetchByCategory('Sports')" class="bg-gray-900/50 border border-gray-800 px-5 py-2.5 rounded-2xl text-[10px] font-black hover:border-blue-500 transition-all">🏆 SPORTS</button>
            <button onclick="FetchByCategory('Business')" class="bg-gray-900/50 border border-gray-800 px-5 py-2.5 rounded-2xl text-[10px] font-black hover:border-blue-500 transition-all">💼 BUSINESS</button>
            <button onclick="FetchByCategory('Local')" class="bg-gray-900/50 border border-gray-800 px-5 py-2.5 rounded-2xl text-[10px] font-black hover:border-blue-500 transition-all">📍 LOCAL</button>
        </div>

        <div id="newsGrid" class="mt-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <footer class="p-10 text-center border-t border-gray-900 mt-20 opacity-50">
        <p class="text-[9px] font-black uppercase tracking-[0.4em]">© 2026 NISHANTH KN|AI&DS|PCE| </p>
    </footer>

    <script>
        const GEMINI_API_KEY = 'AlzaSyCTheqaqkuuScbCqPpiyakl5NA1ZRuRRk';

        // Core Fetching Function
        async function FetchNews(forcedQuery) {
            let query = forcedQuery || document.getElementById('searchInput').value || 'Technology';
            const grid = document.getElementById('newsGrid');

            if (query === 'Local') { query = 'site:tamil.oneindia.com'; }

            grid.innerHTML = `
                <div class="col-span-full text-center py-20">
                    <div class="animate-spin inline-block w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full mb-4"></div>
                    <p class="text-blue-400 font-bold animate-pulse uppercase tracking-widest">📡 AI SYNCING: ${query.toUpperCase()}</p>
                </div>`;

            try {
                const ts = new Date().getTime(); 
                const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=ta-IN&gl=IN&ceid=IN:ta&v=${ts}`;
                const rssToJson = "https://api.rss2json.com/v1/api.json?rss_url=";

                const response = await fetch(`${rssToJson}${encodeURIComponent(rssUrl)}&nocache=${ts}`);
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    data.items.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
                    displayNews(data.items.slice(0, 16));
                } else {
                    grid.innerHTML = `<p class="col-span-full text-center py-20 text-gray-400">No updates found.</p>`;
                }
            } catch (e) {
                grid.innerHTML = `<p class="col-span-full text-center text-red-500 py-20 font-bold">Network Busy. Retrying...</p>`;
                setTimeout(() => FetchNews(query), 5000);
            }
        }

        function displayNews(articles) {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = ''; 

            articles.forEach((article) => {
                const safeTitle = article.title.replace(/'/g, "").replace(/"/g, "");
                const dateObj = new Date(article.pubDate);
                const timeStr = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const dateStr = dateObj.toLocaleDateString([], { day: '2-digit', month: 'short', year: 'numeric' });
                const imageUrl = `https://loremflickr.com/400/250/tech,ai?lock=${Math.floor(Math.random() * 1000)}`;

                grid.innerHTML += `
                    <div class="bg-gray-900 border border-gray-800 p-5 rounded-[32px] hover:border-blue-500 transition-all flex flex-col group shadow-xl">
                        <img src="${imageUrl}" class="w-full h-44 object-cover rounded-2xl mb-4 bg-gray-800 group-hover:scale-105 transition-all" 
                             onerror="this.src='https://raw.githubusercontent.com/NishanthKn12/AI-NEWS-REPORTER/main/logo.png'">
                        
                        <div class="text-[9px] text-gray-500 font-bold mb-2 uppercase">📅 ${dateStr} | 🕒 ${timeStr}</div>
                        <h3 class="font-bold text-sm mb-4 line-clamp-2 text-gray-100">${article.title}</h3>
                        
                        <div class="flex justify-between items-center mb-4 text-[10px] font-black uppercase">
                            <a href="${article.link}" target="_blank" class="text-blue-400 underline decoration-blue-900">VIEW SOURCE</a>
                            <button onclick="window.open('https://wa.me/?text=${encodeURIComponent(article.link)}')" class="text-green-500 font-bold">SHARE</button>
                        </div>
                        <button onclick="getAiSummary(this, '${safeTitle}')" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl text-[10px] font-black tracking-widest transition-all">
                            ✨ GET AI TAMIL SUMMARY
                        </button>
                    </div>`;
            });
        }

        async function getAiSummary(button, title) {
            const originalText = button.innerHTML;
            button.innerText = "🤖 ANALYZING...";
            button.disabled = true;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Explain in 2 lines in simple Tamil: "${title}"` }] }] })
                });
                const data = await response.json();
                const summary = data.candidates[0].content.parts[0].text;
                
                const speech = new SpeechSynthesisUtterance(summary);
                speech.lang = 'ta-IN';
                window.speechSynthesis.speak(speech);
                alert(`🚀 AI REPORT:\n\n${summary}`);
            } catch (e) { alert("AI Busy! Try again."); }
            finally { button.innerHTML = originalText; button.disabled = false; }
        }

        function startVoiceSearch() {
            const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
            if (!SpeechRecognition) return alert("Browser supports illai!");
            const rec = new SpeechRecognition();
            rec.onstart = () => document.getElementById('micBtn').innerText = "🔴";
            rec.onresult = (e) => {
                const t = e.results[0][0].transcript;
                document.getElementById('searchInput').value = t;
                FetchNews(t);
            };
            rec.onend = () => document.getElementById('micBtn').innerText = "🎤";
            rec.start();
        }

        function FetchByCategory(category) {
            document.getElementById('searchInput').value = category;
            FetchNews(category);
        }

        window.addEventListener('load', () => {
            const splash = document.getElementById('splash-screen');
            setTimeout(() => {
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 1000);
                FetchNews();
            }, 2500);
        });
    </script>
</body>
</html>
