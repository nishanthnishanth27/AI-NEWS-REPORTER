<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Reporter - NISHANTH KN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        @keyframes loading-bar { 0% { transform: translateX(-100%); } 100% { transform: translateX(250%); } }
        .animate-loading-bar { animation: loading-bar 2s ease-in-out infinite; }
        #splash-screen { transition: opacity 0.8s ease-out; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen overflow-x-hidden">

    <div id="splash-screen" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black">
        <img src="https://raw.githubusercontent.com/NishanthKn12/AI-NEWS-REPORTER/main/logo.png" 
             class="w-24 h-24 mb-6 animate-bounce" 
             onerror="this.src='https://cdn-icons-png.flaticon.com/512/3820/3820177.png'">
        <h1 class="text-2xl font-black text-blue-500 tracking-tighter uppercase">AI NEWS REPORTER</h1>
        <p class="text-gray-500 text-[9px] mt-2 uppercase tracking-widest">Developed by NISHANTH KN</p>
        <div class="w-48 h-1 bg-gray-900 rounded-full mt-8 overflow-hidden">
            <div class="h-full bg-blue-600 animate-loading-bar"></div>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <header class="p-4 bg-black border-b border-gray-900 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 class="text-lg font-black text-blue-500 italic uppercase">AI NEWS</h1>
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-bold text-gray-400">NISHANTH KN</span>
                    <img src="https://raw.githubusercontent.com/NishanthKn12/AI-NEWS-REPORTER/main/profile.png" class="w-8 h-8 rounded-full border border-blue-600" onerror="this.src='https://via.placeholder.com/50'">
                </div>
            </div>
        </header>

        <main class="p-6 max-w-7xl mx-auto">
            <div class="max-w-2xl mx-auto mb-10 flex gap-2">
                <input type="text" id="searchInput" placeholder="Search news..." class="flex-1 bg-gray-900 border border-gray-800 rounded-2xl px-4 py-3 outline-none focus:border-blue-500">
                <button onclick="FetchNews()" class="bg-blue-600 px-6 py-3 rounded-2xl font-bold uppercase text-xs">Search</button>
            </div>
            <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </main>
    </div>

    <script>
        const GEMINI_API_KEY = 'AlzaSyCTheqaqkuuScbCqPpiyakI5NA1ZRuRRk';

        // SAFETY LOGIC: Automatic Splash Screen Removal
        function hideSplash() {
            const splash = document.getElementById('splash-screen');
            const main = document.getElementById('main-content');
            
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                main.classList.remove('hidden'); // Content-ai show pannum
                FetchNews('Technology');
            }, 800);
        }

        // Window load aagala-naalum 3 seconds-la hide panna force pannuvom
        window.addEventListener('load', hideSplash);
        setTimeout(hideSplash, 3500); // Fail-safe timer

        async function FetchNews(forcedQuery) {
            let query = forcedQuery || document.getElementById('searchInput').value || 'Technology';
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = `<p class="col-span-full text-center text-blue-500 animate-pulse font-bold">📡 FETCHING: ${query.toUpperCase()}</p>`;

            try {
                // RSS to JSON API - Reliable proxy
                const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=ta&gl=IN&ceid=IN:ta`;
                const rssToJson = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

                const response = await fetch(rssToJson);
                const data = await response.json();

                if (data.status === 'ok') {
                    displayNews(data.items.slice(0, 12));
                }
            } catch (e) {
                grid.innerHTML = `<p class="col-span-full text-center text-red-500">Error loading news. Check Connection.</p>`;
            }
        }

        function displayNews(articles) {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = '';
            articles.forEach(article => {
                const safeTitle = article.title.replace(/'/g, "");
                grid.innerHTML += `
                    <div class="bg-gray-900 border border-gray-800 p-4 rounded-3xl hover:border-blue-500 transition-all">
                        <img src="https://loremflickr.com/400/220/tech?lock=${Math.random()}" class="rounded-2xl mb-4 w-full h-40 object-cover">
                        <h3 class="font-bold text-sm mb-4 line-clamp-2">${article.title}</h3>
                        <a href="${article.link}" target="_blank" class="text-blue-400 text-[10px] uppercase font-black underline mb-4 block text-center">Read Full Story</a>
                        <button onclick="getAiSummary(this, '${safeTitle}')" class="w-full bg-blue-600 py-3 rounded-2xl text-[10px] font-black uppercase shadow-lg">✨ AI Summary</button>
                    </div>`;
            });
        }

        async function getAiSummary(btn, title) {
            const original = btn.innerText;
            btn.innerText = "🤖 ANALYZING...";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Summarize in 2 lines simple Tamil: ${title}` }] }] })
                });
                const d = await res.json();
                alert("AI TAMIL SUMMARY:\n\n" + d.candidates[0].content.parts[0].text);
            } catch (e) { alert("AI Service Busy!"); }
            btn.innerText = original;
        }
    </script>
</body>
</html>
