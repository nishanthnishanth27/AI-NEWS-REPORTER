<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Reporter - NISHANTH KN</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Favicon -->
    <link rel="icon" href="https://raw.githubusercontent.com/NishanthKn12/AI-NEWS-REPORTER/main/logo.png">

    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        #splash-screen { transition: opacity 0.8s ease-out; z-index: 1000; }

        @keyframes loading-bar { 0% { transform: translateX(-100%); } 100% { transform: translateX(250%); } }
        .animate-loading-bar { animation: loading-bar 2s ease-in-out infinite; }

        #sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 500; }
        .sidebar-open { transform: translateX(0); }
        .sidebar-closed { transform: translateX(-100%); }
        #overlay { transition: opacity 0.3s ease; }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
        .animate-marquee {
            display: inline-block;
            animation: marquee 30s linear infinite;
        }
        .animate-marquee:hover { animation-play-state: paused; }
    </style>
</head>

<body class="bg-[#050505] text-white min-h-screen font-sans overflow-x-hidden">

<!-- ================= SPLASH ================= -->
<div id="splash-screen" class="fixed inset-0 flex flex-col items-center justify-center bg-black">
    <h1 class="text-2xl font-black text-blue-500 italic">AI NEWS REPORTER</h1>
    <p class="text-gray-500 text-[10px] mt-2 uppercase">Developed by Nishanth KN</p>
    <div class="w-48 h-1 bg-gray-900 mt-6 overflow-hidden">
        <div class="h-full bg-blue-600 animate-loading-bar"></div>
    </div>
</div>

<!-- ================= OVERLAY ================= -->
<div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/80 hidden opacity-0 z-40"></div>

<!-- ================= SIDEBAR ================= -->
<div id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-[#0a0a0a] border-r border-gray-900 sidebar-closed p-6 z-50">

    <div class="flex justify-between mb-8">
        <h2 class="text-blue-500 font-black">MENU</h2>
        <button onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
    </div>

    <button onclick="FetchByCategory('Technology')" class="block mb-3">💻 Technology</button>
    <button onclick="FetchByCategory('Sports')" class="block mb-3">🏆 Sports</button>
    <button onclick="FetchByCategory('Business')" class="block mb-3">💼 Business</button>
    <button onclick="FetchByCategory('Tamil Nadu')" class="block mb-3">📍 Local</button>

    <hr class="my-4 border-gray-800">

    <button onclick="showVideoPanel()" class="block mb-3 text-blue-400">📺 Live News</button>
    <button onclick="showAbout()" class="block text-gray-400">ℹ️ About</button>

</div>

<!-- ================= HEADER ================= -->
<header class="p-4 flex justify-between items-center border-b border-gray-900">

    <button onclick="toggleSidebar()" class="text-blue-500 text-xl">
        <i class="fas fa-bars"></i>
    </button>

    <h1 class="text-blue-500 font-black">AI NEWS</h1>

    <div class="flex gap-2">
        <button id="langEn" onclick="changeLanguage('en')" class="bg-blue-600 px-3 py-1 text-xs">EN</button>
        <button id="langTa" onclick="changeLanguage('ta')" class="text-gray-500 px-3 py-1 text-xs">TA</button>
    </div>

</header>

<!-- ================= MARQUEE ================= -->
<div class="bg-blue-600/10 py-2 overflow-hidden whitespace-nowrap">
    <div class="animate-marquee text-xs">
        ⚡ AI Tamil summaries | 🌍 Global News | 📍 Tamil Nadu Updates | 🎙 Voice Search Enabled
    </div>
</div>

<!-- ================= SEARCH ================= -->
<div class="p-4 flex gap-2">
    <input id="searchInput" type="text" placeholder="Search news..."
        class="flex-1 bg-[#0a0a0a] border border-gray-800 rounded-xl px-4 py-2 text-sm">

    <button onclick="FetchNews()" class="bg-blue-600 px-4 rounded-xl">
        <i class="fas fa-search"></i>
    </button>

    <button id="micBtn" onclick="startVoiceSearch()" class="bg-gray-800 px-4 rounded-xl">
        <i class="fas fa-microphone"></i>
    </button>
</div>

<!-- ================= CATEGORY ================= -->
<div class="flex gap-2 justify-center mb-4 flex-wrap">
    <button onclick="FetchByCategory('Technology')" class="px-3 py-1 bg-gray-900 rounded">Tech</button>
    <button onclick="FetchByCategory('Sports')" class="px-3 py-1 bg-gray-900 rounded">Sports</button>
    <button onclick="FetchByCategory('Business')" class="px-3 py-1 bg-gray-900 rounded">Business</button>
    <button onclick="FetchByCategory('Tamil Nadu')" class="px-3 py-1 bg-gray-900 rounded">Local</button>
</div>

<!-- ================= NEWS ================= -->
<div id="newsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 p-4"></div>

<!-- ================= FOOTER ================= -->
<footer class="text-center p-6 border-t border-gray-900 mt-10 text-xs text-gray-500">
    © 2026 Nishanth KN
</footer>

<!-- ================= JS ================= -->
<script src="script.js" defer></script>

</body>
</html>
