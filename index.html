<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="app.webmanifest">
    <title>AI News Reporter Pro - Nishanth KN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-950 text-white font-sans min-h-screen">

    <nav class="p-4 bg-black border-b border-blue-900/30 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter text-blue-500 flex items-center gap-2">
                🤖 AI NEWS REPORTER
            </h1>
            <div class="flex items-center gap-3 bg-gray-900/50 p-1 rounded-full border border-gray-800">
                <div class="text-[10px] pr-2 pl-3">
                    <p class="font-bold uppercase text-blue-400 text-right">Developed by:</p>
                    <p class="font-bold text-right">NISHANTH KN</p>
                </div>
            </div>
        </div>
    </nav>

    <div class="p-6 max-w-4xl mx-auto">
        <div class="flex gap-2 bg-gray-900 p-2 rounded-2xl border border-gray-800 focus-within:border-blue-500 transition-all items-center shadow-2xl">
            <input type="text" id="searchInput" placeholder="Search topics (AI, Cricket, Space)..." 
                   class="flex-1 bg-transparent p-3 outline-none text-gray-200">
            
            <button onclick="startVoiceSearch()" id="micBtn" class="p-3 text-gray-400 hover:text-blue-500 transition-all text-xl">
                🎤
            </button>

            <button onclick="FetchNews()" class="bg-blue-600 px-6 py-2 rounded-xl font-bold hover:bg-blue-700 transition-all">
                Search
            </button>
        </div>

        <div class="flex flex-wrap justify-center gap-3 mt-6">
            <button onclick="FetchByCategory('Technology')" class="px-4 py-2 bg-gray-900 text-blue-400 rounded-full border border-gray-800 hover:border-blue-500 transition-all font-bold text-xs uppercase">💻 Tech</button>
            <button onclick="FetchByCategory('Sports')" class="px-4 py-2 bg-gray-900 text-green-400 rounded-full border border-gray-800 hover:border-green-500 transition-all font-bold text-xs uppercase">🏆 Sports</button>
            <button onclick="FetchByCategory('Business')" class="px-4 py-2 bg-gray-900 text-yellow-400 rounded-full border border-gray-800 hover:border-yellow-500 transition-all font-bold text-xs uppercase">💼 Business</button>
            <button onclick="FetchByCategory('Tamil Nadu')" class="px-4 py-2 bg-gray-900 text-red-400 rounded-full border border-gray-800 hover:border-red-500 transition-all font-bold text-xs uppercase">📍 Local</button>
            <button onclick="FetchByCategory('Cinema')" class="px-4 py-2 bg-gray-900 text-purple-400 rounded-full border border-gray-800 hover:border-purple-500 transition-all font-bold text-xs uppercase">🎬 Cinema</button>
        </div>
    </div>

    <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 p-6 max-w-7xl mx-auto">
        <div class="col-span-full text-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-4"></div>
            <p class="text-gray-500 animate-pulse">Booting AI Engine...</p>
        </div>
    </div>

    <footer class="mt-20 p-10 border-t border-gray-900 text-center text-gray-600 text-sm">
        &copy; 2026 NISHANTH KN | AI-Powered News Interface
    </footer>

    <script src="script.js"></script>
    <script>
        // Progressive Web App Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => console.log("Service Worker optional"));
        }
    </script>
</body>
</html>
