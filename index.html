<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Reporter Pro</title>
    <!-- Tailwind CDN Link -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white font-sans min-h-screen">
    
    <!-- Navigation -->
    <nav class="p-6 bg-black border-b border-blue-900/30 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter text-blue-500">🤖 AI NEWS REPORTER</h1>
            <div class="text-xs text-gray-500 text-right">
                <p>Developed by: NISHANTH</p>
                <p>Status: Live Fetching</p>
            </div>
        </div>
    </nav>

    <!-- Search Section -->
    <div class="p-6 max-w-4xl mx-auto mt-8">
        <div class="flex gap-3 bg-gray-900 p-2 rounded-2xl border border-gray-800 focus-within:border-blue-500 transition-all">
            <input type="text" id="searchInput" placeholder="Search any topic (e.g. AI, Space, Cricket)..." 
                class="flex-1 bg-transparent p-3 outline-none text-gray-200">
            <button onclick="fetchNews()" class="bg-blue-600 px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition active:scale-95">
                Search
            </button>
        </div>

        <!-- News Grid -->
        <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-12">
            <!-- News will be injected here by script.js -->
            <div class="col-span-full text-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-4"></div>
                <p class="text-gray-500">Booting AI Engine...</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-20 p-10 border-t border-gray-900 text-center text-gray-600 text-sm">
        &copy; 2026 NISHANTH | AI-Powered News Interface
    </footer>

    <!-- Linking your JavaScript -->
    <script src="script.js"></script>
</body>
</html>
