<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="app.webmanifest">
    <title>AI News Reporter Pro - NISHANTH KN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-950 text-white font-sans min-h-screen">

    <nav class="p-4 bg-black border-b border-blue-900/30 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter text-blue-500 flex items-center gap-2">🤖 AI NEWS REPORTER</h1>
            
            <div class="flex items-center gap-3 bg-gray-900/80 p-1.5 pr-4 rounded-full border border-gray-800 shadow-lg">
                <img src="https://raw.githubusercontent.com/nishanthnishanth27/AI-NEWS-REPORTER/main/profile.png" 
                     alt="Nishanth"
                     class="w-10 h-10 rounded-full border-2 border-blue-500 object-cover"
                     onerror="this.src='https://ui-avatars.com/api/?name=Nishanth&background=007bff&color=fff'">
                <div class="text-[10px] text-right">
                    <p class="font-bold text-blue-400 uppercase leading-none mb-1">Developed by:</p>
                    <p class="font-bold text-white tracking-tight leading-none">NISHANTH KN</p>
                </div>
            </div>
        </div>
    </nav>

    <div class="p-6 max-w-4xl mx-auto">
        <div class="flex gap-2 bg-gray-900 p-2 rounded-2xl border border-gray-800 focus-within:border-blue-500 items-center">
            <input type="text" id="searchInput" placeholder="Search topics (AI, Cricket, Space)..." 
                   class="flex-1 bg-transparent p-3 outline-none text-gray-200">
            <button onclick="startVoiceSearch()" id="micBtn" class="p-3 text-gray-400 hover:text-blue-500 text-xl transition-all">🎤</button>
            <button onclick="FetchNews()" class="bg-blue-600 px-6 py-2 rounded-xl font-bold hover:bg-blue-700 transition-all active:scale-95">Search</button>
        </div>

        <div class="flex flex-wrap justify-center gap-3 mt-6">
            <button onclick="FetchByCategory('Technology')" class="px-4 py-2 bg-gray-900 text-blue-400 rounded-full border border-gray-800 hover:border-blue-500 transition-all font-bold text-xs uppercase">💻 Tech</button>
            <button onclick="FetchByCategory('Sports')" class="px-4 py-2 bg-gray-900 text-green-400 rounded-full border border-gray-800 hover:border-green-500 transition-all font-bold text-xs uppercase">🏆 Sports</button>
            <button onclick="FetchByCategory('Business')" class="px-4 py-2 bg-gray-900 text-yellow-400 rounded-full border border-gray-800 hover:border-yellow-500 transition-all font-bold text-xs uppercase">💼 Business</button>
            <button onclick="FetchByCategory('Tamil Nadu')" class="px-4 py-2 bg-gray-900 text-red-400 rounded-full border border-gray-800 hover:border-red-500 transition-all font-bold text-xs uppercase">📍 Local</button>
            <button onclick="FetchByCategory('Cinema')" class="px-4 py-2 bg-gray-900 text-purple-400 rounded-full border border-gray-800 hover:border-purple-500 transition-all font-bold text-xs uppercase">🎬 Cinema</button>
            <button onclick="FetchByCategory('Education')" class="px-4 py-2 bg-gray-900 text-pink-400 rounded-full border border-gray-800 hover:border-pink-500 transition-all font-bold text-xs uppercase">📚 Edu</button>
        </div>
    </div>

<div id="newsGrid" class="col-span-full min-h-[60vh] flex flex-col items-center justify-center rounded-[40px] border border-gray-900 shadow-2xl relative overflow-hidden transition-all duration-500" 
     style="background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.95)), url('https://raw.githubusercontent.com/nishanthnishanth27/AI-NEWS-REPORTER/main/logo.png'); background-size: cover; background-position: center;">
    
    <div class="z-10 text-center flex flex-col items-center gap-8 p-10">
        
        <div class="relative group">
            <div class="absolute -inset-4 bg-blue-600 rounded-full animate-ping opacity-20 group-hover:opacity-40 transition-all"></div>
            <img src="https://raw.githubusercontent.com/nishanthnishanth27/AI-NEWS-REPORTER/main/logo.png" 
                 class="w-32 md:w-48 drop-shadow-[0_0_15px_rgba(59,130,246,0.5)] relative"
                 alt="Nishanth Logo"
                 onerror="this.src='https://ui-avatars.com/api/?name=Nishanth&background=007bff&color=fff'">
        </div>

        <div class="space-y-2">
            <p class="text-[10px] font-black uppercase tracking-[0.3em] text-blue-500 animate-pulse">
                System Initializing...
            </p>
            <h2 class="text-xl font-bold text-white tracking-tighter opacity-80">
                AI NEWS REPORTER <span class="text-blue-600">PRO</span>
            </h2>
            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest border-t border-gray-800 pt-2 inline-block">
                Designed by Nishanth KN
            </p>
        </div>

        <div class="w-48 h-1 bg-gray-800 rounded-full overflow-hidden mt-4">
            <div class="h-full bg-blue-600 animate-loading-bar" style="width: 30%;"></div>
        </div>
    </div>
</div>

<style>
@keyframes loading-bar {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(250%); }
}
.animate-loading-bar {
    animation: loading-bar 2s ease-in-out infinite;
}
</style>
    
    <footer class="p-10 border-t border-gray-900 text-center text-gray-600 text-[10px] uppercase tracking-widest mt-10">
        &copy; 2026 NISHANTH KN | Paavai College of Engineering
    </footer>

    <script src="script.js"></script>
</body>
</html>
